<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOPPER SAHURRRRR</title>
    <style>
        body {
            background-color: #ffcc00;
            font-family: 'Impact', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            font-size: 5rem;
            color: #d90429;
            text-shadow: 4px 4px 0px #fff;
            z-index: 10;
        }

        /* The Chopper Image Style */
        #chopper {
            position: absolute;
            width: 200px; /* Adjust size as needed */
            height: auto;
            z-index: 5;
            transition: transform 0.1s;
        }

        .snooze-btn {
            margin-top: 20px;
            padding: 20px 40px;
            font-size: 2rem;
            background: #000;
            color: #fff;
            border: 5px solid #fff;
            cursor: pointer;
            border-radius: 50px;
            font-weight: bold;
            z-index: 100;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            color: gold;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startChaos()">
        <h1>TAP FOR CHOPPER SAHUR <br> 🦌 🥁 📢</h1>
    </div>

    <img src="chopper.jpg" id="chopper" alt="CHOPPER">

    <h1 id="main-text">TUNG TUNG TUNG!</h1>
    
    <button class="snooze-btn" onclick="blastHorn()">SNOOZE (CHOPPER MODE)</button>

    <audio id="sahurAudio" loop>
        <source src="sahur.mp3" type="audio/mpeg">
    </audio>
    <audio id="hornAudio">
        <source src="https://www.myinstants.com/media/sounds/mlg-airhorn.mp3" type="audio/mpeg">
    </audio>

    <script>
        let posX = 0, posY = 0;
        let speedX = 5, speedY = 5;
        let isMoving = false;

        function startChaos() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('sahurAudio').play();
            isMoving = true;
            moveChopper();
            
            // Background Flash
            setInterval(() => {
                const colors = ['#ff0000', '#00ff00', '#ffffff', '#ffff00', '#ff00ff'];
                document.body.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            }, 150);
        }

        function moveChopper() {
            const img = document.getElementById('chopper');
            const screenWidth = window.innerWidth - img.clientWidth;
            const screenHeight = window.innerHeight - img.clientHeight;

            function animate() {
                if (!isMoving) return;
                
                posX += speedX;
                posY += speedY;

                if (posX >= screenWidth || posX <= 0) speedX *= -1;
                if (posY >= screenHeight || posY <= 0) speedY *= -1;

                img.style.left = posX + 'px';
                img.style.top = posY + 'px';
                
                requestAnimationFrame(animate);
            }
            animate();
        }

        function blastHorn() {
            const horn = document.getElementById('hornAudio');
            horn.currentTime = 0;
            horn.play();

            // Make Chopper go CRAZY speed
            speedX = (speedX > 0 ? 25 : -25);
            speedY = (speedY > 0 ? 25 : -25);

            document.getElementById('main-text').innerText = "CHOPPER IS ANGRY!!";
            
            setTimeout(() => {
                document.getElementById('main-text').innerText = "TUNG TUNG TUNG!";
            }, 2000);
        }
    </script>
</body>
</html>
