<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ULTIMATE SAHUR TRAP</title>
    <style>
        body {
            background-color: #ffafcc;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-color 0.05s;
        }

        #main-text {
            font-size: 4rem;
            color: white;
            text-shadow: 3px 3px #ff5c8a;
            z-index: 100;
            text-align: center;
        }

        #chopper {
            position: absolute;
            width: 200px;
            z-index: 50;
            border-radius: 20px;
            border: 8px solid white;
        }

        .snooze-btn {
            display: none; /* Hidden until the drop */
            margin-top: 30px;
            padding: 25px 50px;
            font-size: 2.5rem;
            background: #ff0000;
            color: white;
            border: 5px solid white;
            cursor: pointer;
            z-index: 200;
            font-weight: bold;
            border-radius: 50px;
        }

        /* Flash classes */
        .chaos-mode { background-color: #000 !important; font-family: 'Impact' !important; }
    </style>
</head>
<body>

    <div id="overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:1000; display:flex; align-items:center; justify-content:center; cursor:pointer;">
        <h1>💖 CLICK FOR THE BABY BOO 💖</h1>
    </div>

    <img src="chopper.jpg" id="chopper" alt="CHOPPER">
    <h1 id="main-text">You're so precious...</h1>
    
    <button id="snoozeBtn" class="snooze-btn" onclick="playRandomMeme()">I'M SLEEPING!!!</button>

    <audio id="bazziAudio"><source src="bazzi.mp3" type="audio/mpeg"></audio>
    <audio id="sahurAudio" loop><source src="sahur.mp3" type="audio/mpeg"></audio>

    <script>
        let posX = 0, posY = 0;
        let speedX = 3, speedY = 3;
        let chaosActive = false;

        const memeSounds = [
            "https://www.myinstants.com/media/sounds/mlg-airhorn.mp3",
            "https://www.myinstants.com/media/sounds/get-out-meme.mp3",
            "https://www.myinstants.com/media/sounds/vine-boom.mp3",
            "https://www.myinstants.com/media/sounds/bruh.mp3",
            "https://www.myinstants.com/media/sounds/discord-notification.mp3",
            "https://www.myinstants.com/media/sounds/fart-meme-sound.mp3"
        ];

        function startMeme() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('bazziAudio').play();
            animateChopper();
            
            // Trigger the "Tung Tung Tung" drop after 12 seconds
            setTimeout(triggerTheDrop, 12000); 
        }

        document.getElementById('overlay').onclick = startMeme;

        function animateChopper() {
            const img = document.getElementById('chopper');
            function move() {
                const screenWidth = window.innerWidth - img.clientWidth;
                const screenHeight = window.innerHeight - img.clientHeight;
                posX += speedX; posY += speedY;
                if (posX >= screenWidth || posX <= 0) speedX *= -1;
                if (posY >= screenHeight || posY <= 0) speedY *= -1;
                img.style.left = posX + 'px';
                img.style.top = posY + 'px';
                if(chaosActive) img.style.transform = `rotate(${posX}deg)`;
                requestAnimationFrame(move);
            }
            move();
        }

        function triggerTheDrop() {
            chaosActive = true;
            document.getElementById('bazziAudio').pause();
            document.getElementById('sahurAudio').play(); // Sahur loop starts!
            
            document.body.classList.add('chaos-mode');
            document.getElementById('snoozeBtn').style.display = 'block';
            document.getElementById('main-text').innerText = "TUNG TUNG TUNG SAHURRRRR!!!";
            document.getElementById('main-text').style.fontSize = "6rem";
            
            speedX = 15; speedY = 15;

            // Permanent flashing background
            setInterval(() => {
                const colors = ['#ff0000', '#000000', '#ffffff', '#ffff00'];
                document.body.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            }, 70);
        }

        function playRandomMeme() {
            // Pick a random sound from the list to play OVER the Sahur loop
            const randomUrl = memeSounds[Math.floor(Math.random() * memeSounds.length)];
            const audio = new Audio(randomUrl);
            audio.volume = 1.0;
            audio.play();

            // Visual "Shake" effect on click
            document.getElementById('main-text').style.transform = "scale(1.5)";
            setTimeout(() => {
                document.getElementById('main-text').style.transform = "scale(1)";
            }, 200);
        }
    </script>
</body>
</html>
